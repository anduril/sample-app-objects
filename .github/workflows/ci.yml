name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11

      - name: Check module tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
